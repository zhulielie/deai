<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deai — Make AI Code Look Human</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #58a6ff, #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #8b949e;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .editor-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .editor-row {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #21262d;
            border-bottom: 1px solid #30363d;
        }

        .panel-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #e6edf3;
        }

        .panel-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .badge-input {
            background: #238636;
            color: #fff;
        }

        .badge-output {
            background: #8957e5;
            color: #fff;
        }

        .panel-body {
            position: relative;
        }

        textarea.code-input {
            width: 100%;
            height: 400px;
            background: #0d1117;
            color: #c9d1d9;
            border: none;
            padding: 16px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
        }

        .code-output {
            height: 400px;
            overflow: auto;
            background: #0d1117;
        }

        .code-output pre {
            margin: 0;
            padding: 16px;
            font-size: 13px;
            line-height: 1.6;
        }

        .code-output pre code {
            background: transparent !important;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.85rem;
            color: #8b949e;
            font-weight: 500;
        }

        select, input[type="number"] {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
        }

        select:focus, input:focus {
            border-color: #58a6ff;
        }

        input[type="number"] {
            width: 100px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(90deg, #238636, #2ea043);
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            color: #f85149;
            font-size: 0.9rem;
            padding: 8px 16px;
            background: rgba(248,81,73,0.1);
            border-radius: 6px;
            margin-top: 8px;
        }

        .style-tag {
            font-size: 0.8rem;
            color: #8b949e;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>deai</h1>
        <p>Make AI-generated code look hand-written</p>
    </div>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label for="style">Style</label>
                <select id="style">
                    <option value="random">🎲 Random</option>
                    {% for s in styles %}
                    <option value="{{ s }}">{{ s.title() }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="control-group">
                <label for="seed">Seed</label>
                <input type="number" id="seed" placeholder="random">
            </div>
            <button class="btn btn-primary" id="run-btn" onclick="humanize()">
                <span id="btn-text">Humanize</span>
            </button>
            <span class="style-tag" id="style-used"></span>
        </div>

        <div class="editor-row">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Input (AI Code)</span>
                    <span class="panel-badge badge-input">BEFORE</span>
                </div>
                <div class="panel-body">
                    <textarea class="code-input" id="source" spellcheck="false">def process_user_data(user_list: List[Dict], output_directory: str, verbose: bool = True) -> Optional[str]:
    """
    Process a list of user dictionaries and write the result to a JSON file.
    """
    if user_list is None:
        return None

    processed_results = []
    for user in user_list:
        if not user.get("is_active"):
            continue
        user_id = user["id"]
        user_name = user["name"]
        user_email = user["email"]
        processed_item = {"id": user_id, "name": user_name, "email": user_email, "status": "active"}
        processed_results.append(processed_item)

    if len(processed_results) == 0:
        return None

    output_path = os.path.join(output_directory, "output.json")
    with open(output_path, "w", encoding="utf-8") as f:
        json.dump(processed_results, f, indent=2)

    if verbose:
        print(f"Successfully wrote {len(processed_results)} records to {output_path}")

    return output_path</textarea>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Output (Humanized)</span>
                    <span class="panel-badge badge-output">AFTER</span>
                </div>
                <div class="panel-body">
                    <div class="code-output" id="output">
                        <pre><code class="language-python"># Click "Humanize" to see the result</code></pre>
                    </div>
                </div>
            </div>
        </div>

        <div id="error" class="error-msg" style="display:none;"></div>
    </div>

    <script>
        async function humanize() {
            const btn = document.getElementById('run-btn');
            const btnText = document.getElementById('btn-text');
            const source = document.getElementById('source').value;
            const style = document.getElementById('style').value;
            const seed = document.getElementById('seed').value;
            const outputDiv = document.getElementById('output');
            const errorDiv = document.getElementById('error');
            const styleTag = document.getElementById('style-used');

            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Processing...';
            errorDiv.style.display = 'none';

            try {
                const res = await fetch('/api/humanize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source, style, seed: seed ? parseInt(seed) : null })
                });

                const data = await res.json();

                if (data.ok) {
                    outputDiv.innerHTML = '<pre><code class="language-python">' + escapeHtml(data.result) + '</code></pre>';
                    hljs.highlightAll();
                    styleTag.textContent = 'Style: ' + data.style_used;
                } else {
                    errorDiv.textContent = data.error || 'Unknown error';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error: ' + err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Humanize';
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
