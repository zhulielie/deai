<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deai — Make AI Code Look Human</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 30px 20px 15px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #58a6ff, #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header p { color: #8b949e; font-size: 1rem; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab {
            padding: 8px 20px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #8b949e;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: #238636;
            color: #fff;
            border-color: #238636;
        }
        .tab:hover:not(.active) { border-color: #58a6ff; color: #c9d1d9; }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 14px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .control-group label {
            font-size: 0.8rem;
            color: #8b949e;
            font-weight: 500;
        }
        select, input[type="number"], input[type="text"], input[type="password"] {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 7px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            outline: none;
        }
        select:focus, input:focus { border-color: #58a6ff; }
        input[type="number"] { width: 90px; }
        input[type="text"], input[type="password"] { width: 200px; }
        .btn {
            padding: 9px 22px;
            border: none;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #238636, #2ea043);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover { border-color: #58a6ff; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .engine-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
            margin-left: auto;
        }
        .badge-ast { background: #8957e5; color: #fff; }
        .badge-ai { background: #d29922; color: #000; }
        .style-tag { font-size: 0.75rem; color: #8b949e; }

        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            overflow: hidden;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #21262d;
            border-bottom: 1px solid #30363d;
        }
        .panel-title { font-size: 0.85rem; font-weight: 600; color: #e6edf3; }
        .panel-badge {
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 8px;
            font-weight: 600;
        }
        .badge-input { background: #238636; color: #fff; }
        .badge-output { background: #8957e5; color: #fff; }

        textarea.code-input {
            width: 100%;
            height: 380px;
            background: #0d1117;
            color: #c9d1d9;
            border: none;
            padding: 14px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12.5px;
            line-height: 1.55;
            resize: vertical;
            outline: none;
        }
        .code-output {
            height: 380px;
            overflow: auto;
            background: #0d1117;
        }
        .code-output pre {
            margin: 0;
            padding: 14px;
            font-size: 12.5px;
            line-height: 1.55;
        }
        .code-output pre code { background: transparent !important; }

        .editor-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        @media (max-width: 900px) {
            .editor-row { grid-template-columns: 1fr; }
        }

        .ai-config {
            display: none;
            width: 100%;
            padding: 10px 14px;
            background: #0d1117;
            border-top: 1px solid #30363d;
            gap: 10px;
            flex-wrap: wrap;
        }
        .ai-config.visible { display: flex; }

        .dropzone {
            border: 2px dashed #30363d;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #161b22;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dropzone:hover { border-color: #58a6ff; background: #1c2128; }
        .dropzone.dragover { border-color: #238636; background: #1c2128; }
        .dropzone-text { color: #8b949e; font-size: 0.95rem; }
        .dropzone-text strong { color: #c9d1d9; }

        .error-msg {
            color: #f85149;
            font-size: 0.85rem;
            padding: 8px 14px;
            background: rgba(248,81,73,0.08);
            border-radius: 6px;
            margin-top: 8px;
        }
        .success-msg {
            color: #3fb950;
            font-size: 0.85rem;
            padding: 8px 14px;
            background: rgba(63,185,80,0.08);
            border-radius: 6px;
            margin-top: 8px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="header">
        <h1>deai</h1>
        <p>Dual-engine code style transfer — AST rules + AI rewrite</p>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="setMode('single')" id="tab-single">Single File</div>
            <div class="tab" onclick="setMode('batch')" id="tab-batch">Project ZIP</div>
        </div>

        <!-- SINGLE FILE MODE -->
        <div id="mode-single">
            <div class="controls">
                <div class="control-group">
                    <label>Engine</label>
                    <select id="engine" onchange="toggleAiConfig()">
                        <option value="ast">🤖 AST Rules</option>
                        <option value="ai">🧠 AI Rewrite</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Style</label>
                    <select id="style">
                        <option value="random">🎲 Random</option>
                        {% for s in styles %}
                        <option value="{{ s }}">{{ s.title() }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="control-group">
                    <label>Seed</label>
                    <input type="number" id="seed" placeholder="random">
                </div>
                <button class="btn btn-primary" id="run-btn" onclick="humanize()">
                    <span id="btn-text">Humanize</span>
                </button>
                <span class="engine-badge badge-ast" id="engine-badge">AST</span>
                <span class="style-tag" id="style-used"></span>
            </div>

            <div class="ai-config" id="ai-config">
                <div class="control-group">
                    <label>Provider</label>
                    <select id="provider" onchange="applyProviderPreset()">
                        <option value="openai">OpenAI</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="groq">Groq</option>
                        <option value="together">Together AI</option>
                        <option value="ollama">🖥️ Ollama (local)</option>
                        <option value="custom">⚙️ Custom</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="sk-...">
                </div>
                <div class="control-group">
                    <label>Base URL</label>
                    <input type="text" id="base-url" placeholder="https://api.openai.com/v1">
                </div>
                <div class="control-group">
                    <label>Model</label>
                    <input type="text" id="model" placeholder="gpt-4o-mini">
                </div>
            </div>

            <div class="editor-row">
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">Input (AI Code)</span>
                        <span class="panel-badge badge-input">BEFORE</span>
                    </div>
                    <div class="panel-body">
                        <textarea class="code-input" id="source" spellcheck="false">def process_user_data(user_list: List[Dict], output_directory: str, verbose: bool = True) -> Optional[str]:
    """
    Process a list of user dictionaries and write the result to a JSON file.
    """
    if user_list is None:
        return None

    processed_results = []
    for user in user_list:
        if not user.get("is_active"):
            continue
        user_id = user["id"]
        user_name = user["name"]
        user_email = user["email"]
        processed_item = {"id": user_id, "name": user_name, "email": user_email, "status": "active"}
        processed_results.append(processed_item)

    if len(processed_results) == 0:
        return None

    output_path = os.path.join(output_directory, "output.json")
    with open(output_path, "w", encoding="utf-8") as f:
        json.dump(processed_results, f, indent=2)

    if verbose:
        print(f"Successfully wrote {len(processed_results)} records to {output_path}")

    return output_path</textarea>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">Output (Humanized)</span>
                        <span class="panel-badge badge-output">AFTER</span>
                    </div>
                    <div class="panel-body">
                        <div class="code-output" id="output">
                            <pre><code class="language-python"># Click "Humanize" to see the result</code></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BATCH / ZIP MODE -->
        <div id="mode-batch" class="hidden">
            <div class="controls">
                <div class="control-group">
                    <label>Engine</label>
                    <select id="batch-engine" onchange="toggleBatchAiConfig()">
                        <option value="ast">🤖 AST Rules</option>
                        <option value="ai">🧠 AI Rewrite</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Style</label>
                    <select id="batch-style">
                        <option value="random">🎲 Random</option>
                        {% for s in styles %}
                        <option value="{{ s }}">{{ s.title() }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="control-group">
                    <label>Seed</label>
                    <input type="number" id="batch-seed" placeholder="random">
                </div>
                <button class="btn btn-primary" id="batch-btn" onclick="processZip()">
                    <span id="batch-btn-text">Process & Download</span>
                </button>
            </div>

            <div class="ai-config" id="batch-ai-config">
                <div class="control-group">
                    <label>Provider</label>
                    <select id="batch-provider" onchange="applyBatchProviderPreset()">
                        <option value="openai">OpenAI</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="groq">Groq</option>
                        <option value="together">Together AI</option>
                        <option value="ollama">🖥️ Ollama (local)</option>
                        <option value="custom">⚙️ Custom</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>API Key</label>
                    <input type="password" id="batch-api-key" placeholder="sk-...">
                </div>
                <div class="control-group">
                    <label>Base URL</label>
                    <input type="text" id="batch-base-url" placeholder="https://api.openai.com/v1">
                </div>
                <div class="control-group">
                    <label>Model</label>
                    <input type="text" id="batch-model" placeholder="gpt-4o-mini">
                </div>
            </div>

            <div class="dropzone" id="dropzone" onclick="document.getElementById('zip-file').click()">
                <input type="file" id="zip-file" accept=".zip" style="display:none" onchange="handleFileSelect(event)">
                <div class="dropzone-text">
                    <strong>Click to upload</strong> or drag a ZIP here<br>
                    <span style="font-size:0.8rem;opacity:0.6;">All .py files will be humanized, rest preserved</span>
                </div>
            </div>
            <div id="batch-status"></div>
        </div>

        <div id="error" class="error-msg" style="display:none;"></div>
    </div>

    <script>
        function setMode(mode) {
            document.getElementById('tab-single').classList.toggle('active', mode === 'single');
            document.getElementById('tab-batch').classList.toggle('active', mode === 'batch');
            document.getElementById('mode-single').classList.toggle('hidden', mode !== 'single');
            document.getElementById('mode-batch').classList.toggle('hidden', mode !== 'batch');
        }

        function toggleAiConfig() {
            const engine = document.getElementById('engine').value;
            const badge = document.getElementById('engine-badge');
            const cfg = document.getElementById('ai-config');
            cfg.classList.toggle('visible', engine === 'ai');
            badge.textContent = engine.toUpperCase();
            badge.className = 'engine-badge ' + (engine === 'ai' ? 'badge-ai' : 'badge-ast');
        }

        function toggleBatchAiConfig() {
            const engine = document.getElementById('batch-engine').value;
            document.getElementById('batch-ai-config').classList.toggle('visible', engine === 'ai');
        }

        const PROVIDER_PRESETS = {
            openai:   { base_url: '',                                 model: 'gpt-4o-mini',                           key_label: 'sk-...' },
            deepseek: { base_url: 'https://api.deepseek.com/v1',       model: 'deepseek-chat',                         key_label: 'sk-...' },
            anthropic:{ base_url: 'https://api.anthropic.com/v1',      model: 'claude-3-5-sonnet-20241022',            key_label: 'sk-ant-...' },
            groq:     { base_url: 'https://api.groq.com/openai/v1',    model: 'llama-3.2-90b-vision-preview',          key_label: 'gsk_...' },
            together: { base_url: 'https://api.together.xyz/v1',       model: 'meta-llama/Llama-3.2-70B-Instruct-Turbo', key_label: 'sk-...' },
            ollama:   { base_url: 'http://localhost:11434/v1',         model: 'llama3.2',                              key_label: 'optional' },
            custom:   { base_url: '',                                 model: '',                                      key_label: 'sk-...' },
        };

        function applyProviderPreset() {
            const p = document.getElementById('provider').value;
            const preset = PROVIDER_PRESETS[p] || PROVIDER_PRESETS.custom;
            document.getElementById('base-url').value = preset.base_url;
            document.getElementById('model').value = preset.model;
            const keyInput = document.getElementById('api-key');
            keyInput.placeholder = preset.key_label;
            keyInput.disabled = p === 'ollama';
        }

        function applyBatchProviderPreset() {
            const p = document.getElementById('batch-provider').value;
            const preset = PROVIDER_PRESETS[p] || PROVIDER_PRESETS.custom;
            document.getElementById('batch-base-url').value = preset.base_url;
            document.getElementById('batch-model').value = preset.model;
            const keyInput = document.getElementById('batch-api-key');
            keyInput.placeholder = preset.key_label;
            keyInput.disabled = p === 'ollama';
        }

        async function humanize() {
            const btn = document.getElementById('run-btn');
            const btnText = document.getElementById('btn-text');
            const source = document.getElementById('source').value;
            const style = document.getElementById('style').value;
            const seed = document.getElementById('seed').value;
            const engine = document.getElementById('engine').value;
            const outputDiv = document.getElementById('output');
            const errorDiv = document.getElementById('error');
            const styleTag = document.getElementById('style-used');

            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Processing...';
            errorDiv.style.display = 'none';

            const payload = {
                source, style, seed: seed ? parseInt(seed) : null, engine
            };
            if (engine === 'ai') {
                payload.provider = document.getElementById('provider').value || undefined;
                payload.api_key = document.getElementById('api-key').value || undefined;
                payload.base_url = document.getElementById('base-url').value || undefined;
                payload.model = document.getElementById('model').value || undefined;
            }

            try {
                const res = await fetch('/api/humanize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.ok) {
                    outputDiv.innerHTML = '<pre><code class="language-python">' + escapeHtml(data.result) + '</code></pre>';
                    hljs.highlightAll();
                    styleTag.textContent = 'Style: ' + data.style_used + ' | Engine: ' + engine.toUpperCase();
                } else {
                    errorDiv.textContent = data.error || 'Unknown error';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error: ' + err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Humanize';
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const dz = document.getElementById('dropzone');
            dz.querySelector('.dropzone-text').innerHTML = '<strong>' + escapeHtml(file.name) + '</strong><br><span style="font-size:0.8rem;opacity:0.6;">Ready to process</span>';
        }

        // Drag & drop
        const dz = document.getElementById('dropzone');
        dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
        dz.addEventListener('drop', (e) => {
            e.preventDefault();
            dz.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length) {
                document.getElementById('zip-file').files = files;
                handleFileSelect({ target: { files } });
            }
        });

        async function processZip() {
            const fileInput = document.getElementById('zip-file');
            if (!fileInput.files.length) {
                alert('Please select a ZIP file first');
                return;
            }

            const btn = document.getElementById('batch-btn');
            const btnText = document.getElementById('batch-btn-text');
            const status = document.getElementById('batch-status');
            const errorDiv = document.getElementById('error');

            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Processing...';
            status.innerHTML = '';
            errorDiv.style.display = 'none';

            const form = new FormData();
            form.append('zip', fileInput.files[0]);
            form.append('style', document.getElementById('batch-style').value);
            form.append('seed', document.getElementById('batch-seed').value || '');
            form.append('engine', document.getElementById('batch-engine').value);

            const engine = document.getElementById('batch-engine').value;
            if (engine === 'ai') {
                form.append('provider', document.getElementById('batch-provider').value || '');
                form.append('api_key', document.getElementById('batch-api-key').value || '');
                form.append('base_url', document.getElementById('batch-base-url').value || '');
                form.append('model', document.getElementById('batch-model').value || '');
            }

            try {
                const res = await fetch('/api/batch', { method: 'POST', body: form });
                if (res.ok && res.headers.get('content-type')?.includes('zip')) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'deai_output.zip';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                    status.innerHTML = '<div class="success-msg">✅ Download started: deai_output.zip</div>';
                } else {
                    const data = await res.json();
                    errorDiv.textContent = data.error || 'Batch processing failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Error: ' + err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Process & Download';
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
